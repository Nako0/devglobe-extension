name: Release JetBrains Plugin (GitHub only)

on:
  push:
    tags:
      - "jetbrains-release-v*"
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: jetbrains-plugin

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - run: ./gradlew buildPlugin

      - name: Extract version
        id: version
        run: echo "version=$(grep '^version=' gradle.properties | cut -d'=' -f2)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || format('v{0}', steps.version.outputs.version) }}
          name: JetBrains Plugin v${{ steps.version.outputs.version }}
          files: jetbrains-plugin/build/distributions/*.zip
          body: |
            ## JetBrains Plugin v${{ steps.version.outputs.version }}

            Built from commit ${{ github.sha }}

            ### Install manually
            1. Download the `.zip` file below
            2. Go to **Settings → Plugins → ⚙️ → Install Plugin from Disk**
            3. Select the downloaded file
